<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Golf Bros Wolf</title><link rel="stylesheet" href="styles.css"></head>
<body><div class="app">
<h1>🏌️ Golf Bros Wolf</h1>
<p id="status">Enter player names and start.</p>
<div id="setup">
<input id="p0" placeholder="Player 1"><input id="p1" placeholder="Player 2">
<input id="p2" placeholder="Player 3"><input id="p3" placeholder="Player 4">
<button id="start">Start Round</button></div>
<div id="game" style="display:none">
<h2 id="hole"></h2><h3 id="wolf"></h3>
<div id="scores"></div>
<h3>Select Partner</h3><div id="partners"></div>
<button id="wolfWin">Wolf Side Won</button>
<button id="oppWin">Opponents Won</button>
</div></div><script src="app.js"></script></body></html>
