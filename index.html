<!doctype html><html><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Golf Bros Wolf</title><link rel="stylesheet" href="styles.css">
</head><body>
<div class="app">
<h1>🏌️ Golf Bros Wolf</h1>
<div class="card">
<input id="course" placeholder="Course">
<input id="p0" placeholder="Player 1">
<input id="p1" placeholder="Player 2">
<input id="p2" placeholder="Player 3">
<input id="p3" placeholder="Player 4">
<button id="start">Start Round</button>
</div>

<div id="game" class="hide">
<div class="card"><h2 id="hole"></h2><div id="wolf"></div></div>
<div class="card"><h3>Leaderboard</h3><table><tbody id="board"></tbody></table></div>
<div class="card"><h3>Choose Partner</h3><div id="partners"></div></div>
<div class="card">
<button id="wolfWin">✅ Wolf Side Won</button>
<button id="oppWin">⛳ Opponents Won</button>
</div>
</div>
<script src="app.js"></script>
</body></html>
