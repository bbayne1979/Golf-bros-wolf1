<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Golf Bros Wolf</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
<header>
<h1>🏌️ Golf Bros Wolf</h1>
<p>Hole <span id="hole">1</span> of 18</p>
</header>

<div class="card">
<h2>🐺 Current Wolf</h2>
<h3 id="wolf">Player 1</h3>
</div>

<div class="card">
<h2>🏆 Live Scoreboard</h2>
<table>
<thead><tr><th>Player</th><th>Pts</th></tr></thead>
<tbody id="board"></tbody>
</table>
</div>

<div class="card">
<h2>Choose Partner</h2>
<div id="partners"></div>
<button id="lone">🐺 Lone Wolf</button>
</div>

<div class="card">
<button id="wolfWin">✅ Wolf Side Won</button>
<button id="oppWin">⛳ Opponents Won</button>
</div>
<script src="app.js"></script>
</body></html>
